<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 46" width="240" height="46">
  <g fill="white" stroke="#2D3E50" stroke-linecap="round" stroke-linejoin="round">

    <!-- Stem -->
    <path d="M20 30 Q13 37 7 44" stroke-width="1.8" fill="none"/>

    <!-- Leaves on stem -->
    <path d="M15 37 Q7 32 10 26 Q16 32 15 37Z" stroke-width="1.2"/>
    <path d="M11 42 Q4 37 8 32 Q13 38 11 42Z" stroke-width="1.2"/>

    <!-- Petals drawn back to front (white fill creates natural overlap) -->
    <!-- bottom-left -->
    <path d="M20 22 C 11 24 8 33 13 36 C 19 33 21 27 20 22Z" stroke-width="1.5"/>
    <!-- left -->
    <path d="M20 22 C 12 17 4 19 5 25 C 10 28 16 25 20 22Z" stroke-width="1.5"/>
    <!-- top-left -->
    <path d="M20 22 C 14 15 9 8 15 6 C 20 8 21 16 20 22Z" stroke-width="1.5"/>
    <!-- top-right -->
    <path d="M20 22 C 21 14 25 7 30 9 C 30 15 26 19 20 22Z" stroke-width="1.5"/>
    <!-- right -->
    <path d="M20 22 C 26 15 34 16 34 22 C 32 27 26 25 20 22Z" stroke-width="1.5"/>
    <!-- bottom-right -->
    <path d="M20 22 C 27 25 30 33 25 36 C 20 33 19 27 20 22Z" stroke-width="1.5"/>

    <!-- Center bud -->
    <ellipse cx="20" cy="22" rx="4.2" ry="4.5" stroke-width="1.5"/>
    <!-- bud detail lines -->
    <path d="M17 21 Q20 19 23 21" stroke-width="0.9" fill="none"/>
    <path d="M17 23 Q20 22 23 23" stroke-width="0.7" fill="none"/>
