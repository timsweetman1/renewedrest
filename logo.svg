  <!-- Brand name -->
  <text x="42" y="20" font-family="Georgia,'Times New Roman',serif" font-size="17" font-weight="700" letter-spacing="2" fill="#1a2b3c">RENEWED REST</text>
  <!-- Divider -->
  <line x1="42" y1="26" x2="236" y2="26" stroke="#C9967A" stroke-width="0.7" opacity="0.8"/>
  <!-- Subtext -->
  <text x="42" y="37" font-family="Georgia,'Times New Roman',serif" font-size="9" letter-spacing="2.5" fill="#6B7A8D">SLEEP CONSULTING</text>
