  <!-- Main brand name -->
  <text x="34" y="20" font-family="Georgia,'Times New Roman',serif" font-size="14.5" font-weight="700" letter-spacing="2" fill="#1a2b3c">RENEWED REST</text>

  <!-- Rose divider line -->
  <line x1="34" y1="25" x2="196" y2="25" stroke="#C9967A" stroke-width="0.7" opacity="0.8"/>

  <!-- Tagline -->
  <text x="34" y="36" font-family="Georgia,'Times New Roman',serif" font-size="7.5" letter-spacing="2.2" fill="#6B7A8D">SLEEP CONSULTING</text>
</svg>
