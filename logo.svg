<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 44" width="210" height="44">
  <!-- Sketched flower matching brand style -->
  <g stroke="#2D3E50" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- stem from bottom-left -->
    <path d="M6 42 Q10 36 14 30 Q16 26 18 22"/>

    <!-- large rounded petals -->
    <!-- bottom-left petal -->
    <path d="M18 22 Q10 28 8 34 Q14 30 18 22Z"/>
    <!-- left petal -->
    <path d="M18 22 Q8 20 6 14 Q12 18 18 22Z"/>
    <!-- top-left petal -->
    <path d="M18 22 Q12 14 14 7 Q18 13 18 22Z"/>
    <!-- top petal -->
    <path d="M18 22 Q20 12 26 9 Q24 16 18 22Z"/>
    <!-- top-right petal -->
    <path d="M18 22 Q26 14 32 15 Q27 20 18 22Z"/>
    <!-- right petal -->
    <path d="M18 22 Q28 22 31 28 Q25 26 18 22Z"/>
    <!-- bottom-right petal -->
    <path d="M18 22 Q24 30 22 36 Q18 30 18 22Z"/>

    <!-- petal detail lines (veins) -->
    <path d="M18 22 Q11 26 9 32" stroke-width="0.6" opacity="0.6"/>
    <path d="M18 22 Q9 18 8 13" stroke-width="0.6" opacity="0.6"/>
    <path d="M18 22 Q14 13 15 8" stroke-width="0.6" opacity="0.6"/>
    <path d="M18 22 Q21 13 26 10" stroke-width="0.6" opacity="0.6"/>
    <path d="M18 22 Q27 16 31 16" stroke-width="0.6" opacity="0.6"/>
    <path d="M18 22 Q27 24 30 28" stroke-width="0.6" opacity="0.6"/>

    <!-- center bud/circle -->
    <circle cx="18" cy="22" r="3.5" stroke-width="1.2"/>
    <!-- small inner bud detail -->
    <path d="M16 21 Q18 18 20 21 Q18 24 16 21Z" stroke-width="0.8"/>
  </g>

  <!-- Main brand name -->
  <text x="40" y="20" font-family="Georgia,'Times New Roman',serif" font-size="14.5" font-weight="700" letter-spacing="2" fill="#1a2b3c">RENEWED REST</text>

  <!-- Rose divider line -->
  <line x1="40" y1="25" x2="206" y2="25" stroke="#C9967A" stroke-width="0.7" opacity="0.8"/>

  <!-- Subtext -->
  <text x="40" y="36" font-family="Georgia,'Times New Roman',serif" font-size="7.5" letter-spacing="2.2" fill="#6B7A8D">SLEEP CONSULTING</text>
</svg>
