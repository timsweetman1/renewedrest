<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" width="200" height="44">
  <!-- Sketched flower -->
  <g stroke="#2D3E50" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- petals -->
    <path d="M17 22 Q14 18 17 14 Q20 18 17 22Z"/>
    <path d="M17 22 Q21 19 25 21 Q21 25 17 22Z"/>
    <path d="M17 22 Q20 26 17 30 Q14 26 17 22Z"/>
    <path d="M17 22 Q13 25 9 23 Q13 19 17 22Z"/>
    <!-- diagonal petals -->
    <path d="M17 22 Q13 18 14 14 Q18 16 17 22Z"/>
    <path d="M17 22 Q21 18 25 15 Q24 20 17 22Z"/>
    <path d="M17 22 Q21 26 24 29 Q20 28 17 22Z"/>
    <path d="M17 22 Q13 26 10 29 Q10 24 17 22Z"/>
    <!-- center circle -->
    <circle cx="17" cy="22" r="3" stroke-width="1"/>
    <circle cx="17" cy="22" r="1.2" fill="#2D3E50" opacity="0.35" stroke="none"/>
    <!-- small stem -->
    <path d="M17 30 Q17 34 16 36"/>
